- defaults:
    link:
      relink: true

- clean: ["~"]

# Common configurations (both Linux and macOS)
- link:
    ~/.tool-versions: tool-versions
    ~/.config/nvim: nvim
    ~/.tmux.conf: tmux.conf
    ~/.zshrc: zshrc
    ~/.ruff.toml: ruff.toml
    ~/.stylua.toml: stylua.toml
    ~/.config/alacritty: alacritty
    ~/.config/zellij: zellij
    ~/.config/fontconfig: fontconfig
    ~/.config/ghostty: ghostty
    ~/.config/flashspace: flashspace

# Linux-only configurations (bspwm, sxhkd, polybar, rofi)
- link:
    ~/.config/bspwm: bspwm
    ~/.config/sxhkd: sxhkd
    ~/.config/rofi: rofi
    ~/.config/polybar: polybar
  if: '[ "$(uname -s)" = "Linux" ]'
