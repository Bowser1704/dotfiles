- defaults:
    link:
      relink: true

- clean: ["~"]

# Tools configurations (cross-platform CLI tools)
- link:
    ~/.tool-versions: tools/tool-versions
    ~/.config/nvim: tools/nvim
    ~/.tmux.conf: tools/tmux.conf
    ~/.zshrc: tools/zshrc
    ~/.stylua.toml: tools/stylua.toml
    ~/.config/fontconfig: tools/fontconfig

# macOS GUI configurations (ghostty)
- link:
    ~/.config/ghostty:
      path: default-gui/ghostty
      if: '[ "$(uname -s)" = "Darwin" ]'

# Linux GUI configurations (ghostty, bspwm, sxhkd, polybar, rofi)
# Only linked when a display server is available (not on headless servers)
- link:
    ~/.config/ghostty:
      path: default-gui/ghostty
      if: '[ "$(uname -s)" = "Linux" ] && { [ -n "$DISPLAY" ] || [ -n "$WAYLAND_DISPLAY" ]; }'
    ~/.config/bspwm:
      path: linux-gui/bspwm
      if: '[ "$(uname -s)" = "Linux" ] && { [ -n "$DISPLAY" ] || [ -n "$WAYLAND_DISPLAY" ]; }'
    ~/.config/sxhkd:
      path: linux-gui/sxhkd
      if: '[ "$(uname -s)" = "Linux" ] && { [ -n "$DISPLAY" ] || [ -n "$WAYLAND_DISPLAY" ]; }'
    ~/.config/rofi:
      path: linux-gui/rofi
      if: '[ "$(uname -s)" = "Linux" ] && { [ -n "$DISPLAY" ] || [ -n "$WAYLAND_DISPLAY" ]; }'
    ~/.config/polybar:
      path: linux-gui/polybar
      if: '[ "$(uname -s)" = "Linux" ] && { [ -n "$DISPLAY" ] || [ -n "$WAYLAND_DISPLAY" ]; }'
